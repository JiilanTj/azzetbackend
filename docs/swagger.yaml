host: localhost:8080
info:
  contact: {}
  description: Enterprise-grade accounting, tax, and finance platform
  title: Azzet API
  version: "1.0"
paths:
  /admin/admins:
    get:
      description: Returns all platform admins. SUPER_ADMIN only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/admin.AdminResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all admins
      tags:
      - Admin Management
    post:
      consumes:
      - application/json
      description: Create a new platform admin account. SUPER_ADMIN only.
      parameters:
      - description: New admin data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.InviteAdminRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AdminResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Invite new admin
      tags:
      - Admin Management
  /admin/admins/{id}:
    delete:
      description: Soft-delete an admin account. SUPER_ADMIN only.
      parameters:
      - description: Admin ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Deactivate admin
      tags:
      - Admin Management
    patch:
      consumes:
      - application/json
      description: Update admin role or status. SUPER_ADMIN only.
      parameters:
      - description: Admin ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.UpdateAdminRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.MessageResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update admin
      tags:
      - Admin Management
  /admin/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate admin with email + password. If MFA enabled, returns
        mfa_token for step 2.
      parameters:
      - description: Admin credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.LoginResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Admin login (step 1)
      tags:
      - Admin Auth
  /admin/auth/logout:
    post:
      description: Blacklist the admin access token and clear refresh cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.MessageResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin logout
      tags:
      - Admin Auth
  /admin/auth/me:
    get:
      description: Returns the authenticated admin's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AdminResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current admin profile
      tags:
      - Admin Auth
  /admin/auth/mfa/confirm:
    post:
      consumes:
      - application/json
      description: Confirm MFA setup by providing the first TOTP code from authenticator
        app. Enables MFA and issues tokens.
      parameters:
      - description: First TOTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.MFASetupConfirmRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: admin_refresh_token=<token>; Path=/admin; HttpOnly; Secure;
                SameSite=Strict
              type: string
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AuthResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm MFA setup
      tags:
      - Admin Auth
  /admin/auth/mfa/setup:
    post:
      description: Generate TOTP secret and QR code URL. Admin must confirm with first
        code.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.MFASetupResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Setup MFA (first time)
      tags:
      - Admin Auth
  /admin/auth/mfa/verify:
    post:
      consumes:
      - application/json
      description: Verify TOTP code after password authentication. Returns access
        token and sets refresh cookie.
      parameters:
      - description: MFA token + TOTP code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.MFAVerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: admin_refresh_token=<token>; Path=/admin; HttpOnly; Secure;
                SameSite=Strict
              type: string
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AuthResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Verify MFA code (step 2)
      tags:
      - Admin Auth
  /admin/auth/refresh:
    post:
      description: Exchange refresh token (from HttpOnly cookie) for new tokens.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              description: admin_refresh_token=<new_token>; Path=/admin; HttpOnly;
                Secure; SameSite=Strict
              type: string
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/admin.AuthResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      summary: Refresh admin access token
      tags:
      - Admin Auth
  /admin/billing/invoices:
    get:
      description: Returns all invoices across all workspaces. SUPER_ADMIN/ENGINEER
        only.
      parameters:
      - description: Limit (default 50)
        in: query
        name: limit
        type: integer
      - description: Offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/billing.InvoiceResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all invoices (admin)
      tags:
      - Admin Billing
  /admin/plans:
    get:
      description: Returns all plans including inactive with full features. SUPER_ADMIN/ENGINEER
        only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/shared.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/plan.PlanResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/shared.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all plans (admin)
      tags:
      - Admin Plans
    post:
      consumes:
      - application/json
